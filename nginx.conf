server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache para assets com hash (nome imutável)
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache moderado para imagens públicas
    location ~* \.(png|jpg|jpeg|gif|webp|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # JSON de dados — sem cache agressivo para facilitar atualizações
    location ~* \.json$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Fallback para rotas limpas (SPA multi-page: retorna o HTML correto)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
